name: iOS Ad Hoc IPA

run-name: "iOS ${{ inputs.app_slug }} for token ${{ inputs.token }}"

on:
  workflow_dispatch:
    inputs:
      token:
        description: 'Enrollment token (used as IPA filename + callback path)'
        required: true
        type: string
      slug:
        description: 'Project slug'
        required: true
        type: string
      app_slug:
        description: 'App slug'
        required: true
        type: string
      share_token:
        description: 'Project share token (if private)'
        required: false
        type: string
        default: ''
      bundle_id:
        description: 'iOS bundle identifier (com.propbuilder.player.<slug>-<app>)'
        required: true
        type: string
      profile_base64:
        description: 'Ad Hoc .mobileprovision encoded base64 (regenerated per device)'
        required: true
        type: string
      callback_url:
        description: 'API URL to POST when IPA is uploaded (auth via x-resign-secret)'
        required: true
        type: string

env:
  VPS_HOST: 217.182.60.238
  VPS_USER: noxel
  DATA_DIR: /var/www/propbuilder-data
  TEAM_ID: 9MAHFLX3AK

jobs:
  ios:
    name: iOS Ad Hoc IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: player/package-lock.json

      - name: Set up Rust (iOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: player/src-tauri

      - name: Install Player dependencies
        working-directory: player
        run: npm ci

      - name: Fetch project data from VPS
        working-directory: player/public
        env:
          SLUG: ${{ inputs.slug }}
          APP_SLUG: ${{ inputs.app_slug }}
          SHARE_TOKEN: ${{ inputs.share_token }}
        run: |
          QS=""
          if [ -n "${SHARE_TOKEN}" ]; then QS="?share=${SHARE_TOKEN}"; fi
          curl -sSf "https://propbuilder.noxelstudio.com/api/public/preview/${SLUG}/${APP_SLUG}${QS}" -o raw.json
          jq --arg app "${APP_SLUG}" '.project | .apps |= map(select(.slug == $app or .id == $app))' raw.json > project.json
          rm raw.json
          echo "Fetched project.json for ${APP_SLUG} ($(wc -c < project.json) bytes)"
          NAME=$(jq -r '.apps[0].name // "PropBuilder Player"' project.json)
          echo "App display name: ${NAME}"
          # productName becomes the executable filename + CFBundleExecutable.
          # If it has spaces/accents, codesign on macos-latest mis-classifies
          # the executable as a resource → it ends up in CodeResources/files2
          # with a stale hash → "sealed resource is missing or invalid" and
          # iOS rejects install with "couldn't verify integrity". We force
          # an ASCII-safe productName from the app slug, and patch
          # CFBundleDisplayName post-init so iOS still shows the pretty name.
          SAFE_NAME=$(echo "${APP_SLUG}" | tr -cd 'A-Za-z0-9-' | head -c 40)
          [ -z "$SAFE_NAME" ] && SAFE_NAME="PropBuilderPlayer"
          echo "Safe product name (executable filename): ${SAFE_NAME}"
          echo "DISPLAY_NAME=${NAME}" >> "$GITHUB_ENV"
          echo "SAFE_PRODUCT_NAME=${SAFE_NAME}" >> "$GITHUB_ENV"
          CONF=../src-tauri/tauri.conf.json
          jq --arg n "$SAFE_NAME" --arg dn "$NAME" \
            '.productName = $n | .app.windows[0].title = $dn' "$CONF" > tmp.json && mv tmp.json "$CONF"

      - name: Generate iOS icons from custom icon (if any)
        working-directory: player/public
        run: |
          ICON_DATA=$(jq -r '.apps[0].iconDataUrl // empty' project.json)
          if [ -z "$ICON_DATA" ]; then
            echo "No custom icon; Tauri default will be used."
            exit 0
          fi
          ICON_TMP=$(mktemp -d)
          echo "$ICON_DATA" | sed -E 's#^data:image/[^;]+;base64,##' | base64 -d > "$ICON_TMP/src.png"
          # The .png Tauri uses to generate iOS asset catalog when initializing.
          sips -z 1024 1024 "$ICON_TMP/src.png" --out ../src-tauri/icons/icon.png >/dev/null
          echo "Custom icon applied."

      - name: Import Apple distribution certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          P12_PATH="$RUNNER_TEMP/dist.p12"
          echo "$P12_BASE64" | base64 -d > "$P12_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$P12_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "Imported distribution cert into temporary keychain."
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ inputs.profile_base64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_B64" | base64 -d > "$RUNNER_TEMP/build.mobileprovision"
          # Extract UUID and copy to expected path (Apple looks up profiles by UUID).
          PROFILE_UUID=$(security cms -D -i "$RUNNER_TEMP/build.mobileprovision" | plutil -extract UUID raw -)
          PROFILE_NAME=$(security cms -D -i "$RUNNER_TEMP/build.mobileprovision" | plutil -extract Name raw -)
          cp "$RUNNER_TEMP/build.mobileprovision" "$PROFILE_DIR/${PROFILE_UUID}.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed profile $PROFILE_NAME ($PROFILE_UUID)"

      - name: Configure Tauri iOS bundle identifier
        working-directory: player
        env:
          BUNDLE_ID: ${{ inputs.bundle_id }}
        run: |
          CONF=src-tauri/tauri.conf.json
          jq --arg b "$BUNDLE_ID" '.identifier = $b' "$CONF" > tmp.json && mv tmp.json "$CONF"
          echo "Set bundle identifier to $BUNDLE_ID"

      - name: Init Tauri iOS project
        working-directory: player
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ env.TEAM_ID }}
        run: npm run tauri ios init

      - name: Patch .pbxproj for manual signing
        working-directory: player
        run: |
          # Tauri 2 generates the iOS xcodeproj with CODE_SIGN_STYLE=Automatic,
          # which requires an Apple ID configured in Xcode (impossible on a
          # GHA runner). We force Manual signing + inject our profile name +
          # Apple Distribution identity so xcodebuild can sign without an
          # Apple ID. Same patch as scripts/build-player-local-ios.sh.
          PBXPROJ=src-tauri/gen/apple/player.xcodeproj/project.pbxproj
          if [ ! -f "$PBXPROJ" ]; then
            echo "ERROR: .pbxproj not found after tauri ios init" >&2
            exit 1
          fi
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          PROFILE_NAME="$PROFILE_NAME" perl -i -pe 'BEGIN { $p = $ENV{PROFILE_NAME}; }
            s|(DEVELOPMENT_TEAM = [^;]+;)|$1\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "$p";\n\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";|g' "$PBXPROJ"
          echo "Patched .pbxproj for manual signing with profile: $PROFILE_NAME"

      - name: Inject CFBundleDisplayName into iOS Info.plist
        working-directory: player
        run: |
          # productName is ASCII-safe (used as executable filename to avoid
          # codesign confusion), but we want iOS to show the pretty name on
          # the home screen. CFBundleDisplayName overrides CFBundleName for
          # display purposes without touching the executable filename.
          INFO=$(find src-tauri/gen/apple -maxdepth 4 -name Info.plist -type f 2>/dev/null | grep -v "_CodeSignature" | head -1)
          if [ -z "$INFO" ] || [ ! -f "$INFO" ]; then
            echo "WARNING: no Info.plist found post-init ; CFBundleDisplayName not patched"
            find src-tauri/gen/apple -maxdepth 5 -name "*.plist" 2>/dev/null | head -10
          else
            echo "Patching $INFO (CFBundleDisplayName=${DISPLAY_NAME})"
            /usr/libexec/PlistBuddy -c "Delete :CFBundleDisplayName" "$INFO" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string ${DISPLAY_NAME}" "$INFO"
            echo "Final Info.plist (relevant keys):"
            /usr/libexec/PlistBuddy -c "Print :CFBundleName" "$INFO" 2>&1 | sed 's/^/  CFBundleName: /'
            /usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" "$INFO" 2>&1 | sed 's/^/  CFBundleDisplayName: /'
            /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$INFO" 2>&1 | sed 's/^/  CFBundleExecutable: /'
          fi

      - name: Build iOS IPA (Ad Hoc signed)
        working-directory: player
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ env.TEAM_ID }}
        run: |
          # Tauri 2's `tauri ios build` does archive + exportArchive. The
          # export step plants a generated ExportOptions.plist with automatic
          # signing (which CLI doesn't let us override) and dies with
          # "No Accounts". We tolerate that — the prior `xcodebuild build`
          # step has already produced a signed .app via our manual-signing
          # patch, and we package the IPA ourselves below.
          set +e
          npm run tauri ios build -- --export-method release-testing
          TAURI_EXIT=$?
          set -e
          if [ $TAURI_EXIT -ne 0 ]; then
            echo "tauri ios build exit=$TAURI_EXIT (likely export step). Will fall back to manual IPA packaging."
          fi

      - name: Export IPA from xcarchive (manual signing)
        id: find_ipa
        env:
          BUNDLE_ID: ${{ inputs.bundle_id }}
        run: |
          # Tauri's `tauri ios build` does archive + exportArchive. The
          # archive step works (xcodebuild signs the .app properly), but
          # exportArchive fails with "No Accounts" because Tauri's generated
          # ExportOptions.plist uses signingStyle=automatic, which requires
          # an Apple ID. We do exportArchive ourselves with a manual-signing
          # plist — that produces a clean, properly-signed IPA without
          # touching the bundle (no DIY re-sign = no broken seal).
          set -e
          XCARCHIVE=$(find player/src-tauri/gen/apple/build -name "*.xcarchive" -type d 2>/dev/null | head -1)
          if [ -z "$XCARCHIVE" ]; then
            XCARCHIVE=$(find "$HOME/Library/Developer/Xcode" -name "*.xcarchive" -type d 2>/dev/null \
              | xargs -I{} stat -f "%m %N" {} 2>/dev/null \
              | sort -nr | head -1 | cut -d' ' -f2-)
          fi
          if [ -z "$XCARCHIVE" ] || [ ! -d "$XCARCHIVE" ]; then
            echo "ERROR: no .xcarchive found" >&2
            find player/src-tauri/gen/apple/build -maxdepth 5 -type d 2>/dev/null | head -30 >&2 || true
            find "$HOME/Library/Developer/Xcode" -maxdepth 6 -name "*.xcarchive" 2>/dev/null | head >&2 || true
            exit 1
          fi
          echo "xcarchive: $XCARCHIVE"
          ls -la "$XCARCHIVE/Products/Applications/" 2>/dev/null | sed 's/^/  /'

          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions.plist"
          cat > "$EXPORT_OPTIONS" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>release-testing</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${{ env.TEAM_ID }}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <false/>
          </dict>
          </plist>
          PLIST
          echo "ExportOptions.plist:"
          sed 's/^/  /' "$EXPORT_OPTIONS"

          EXPORT_DIR="$RUNNER_TEMP/export"
          mkdir -p "$EXPORT_DIR"
          xcodebuild -exportArchive \
            -archivePath "$XCARCHIVE" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            2>&1 | tail -80

          IPA=$(find "$EXPORT_DIR" -name "*.ipa" | head -1)
          if [ -z "$IPA" ] || [ ! -f "$IPA" ]; then
            echo "ERROR: exportArchive did not produce an IPA" >&2
            ls -la "$EXPORT_DIR" >&2 || true
            exit 1
          fi

          IPA_DIR="player/src-tauri/gen/apple/build"
          mkdir -p "$IPA_DIR"
          FINAL_IPA="$IPA_DIR/$(basename "$IPA")"
          cp "$IPA" "$FINAL_IPA"
          echo "IPA: $FINAL_IPA ($(du -h "$FINAL_IPA" | cut -f1))"
          echo "path=$FINAL_IPA" >> "$GITHUB_OUTPUT"

      - name: Verify IPA codesign + profile
        id: verify_ipa
        env:
          IPA_PATH: ${{ steps.find_ipa.outputs.path }}
        run: |
          # Diagnostic step. iOS install will fail with "couldn't verify
          # integrity" if codesign is broken, so we want to catch that here
          # rather than pushing a broken IPA to the user's iPhone.
          TMP=$(mktemp -d)
          (cd "$TMP" && unzip -q "$GITHUB_WORKSPACE/$IPA_PATH" || ditto -x -k "$GITHUB_WORKSPACE/$IPA_PATH" .)
          APP_IN_IPA=$(find "$TMP/Payload" -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_IN_IPA" ]; then
            echo "ERROR: no .app inside Payload/" >&2
            ls -la "$TMP/Payload" >&2 || true
            exit 1
          fi
          echo "=== codesign -dvv ==="
          codesign -dvv "$APP_IN_IPA" 2>&1 || true
          echo
          echo "=== codesign --verify --deep --strict ==="
          if codesign --verify --deep --strict --verbose=4 "$APP_IN_IPA" 2>&1; then
            echo "OK: codesign verifies."
          else
            echo "WARNING: codesign --verify failed. iOS will reject install."
            echo
            echo "=== Bundle contents (top level) ==="
            ls -la "$APP_IN_IPA" | sed 's/^/  /'
            echo
            echo "=== Sealed resources (CodeResources hashes section) ==="
            plutil -extract files2 xml1 -o - "$APP_IN_IPA/_CodeSignature/CodeResources" 2>&1 | head -100 | sed 's/^/  /'
            echo
            echo "=== All files (excl. _CodeSignature) ==="
            find "$APP_IN_IPA" -type f -not -path "*/_CodeSignature/*" | sed 's|.*\.app/||' | sort | sed 's/^/  /'
          fi
          echo
          echo "=== embedded.mobileprovision (Name + UUID + Devices) ==="
          security cms -D -i "$APP_IN_IPA/embedded.mobileprovision" 2>/dev/null \
            | plutil -convert xml1 -o - - \
            | awk '/<key>(Name|UUID|TeamIdentifier|ExpirationDate)<\/key>/{getline v; print; print v} /ProvisionedDevices/,/<\/array>/'
          rm -rf "$TMP"

      - name: Set up SSH to VPS
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload IPA to VPS
        env:
          IPA_PATH: ${{ steps.find_ipa.outputs.path }}
          TOKEN: ${{ inputs.token }}
          SLUG: ${{ inputs.slug }}
          APP_SLUG: ${{ inputs.app_slug }}
        run: |
          REMOTE_DIR="${{ env.DATA_DIR }}/${SLUG}/${APP_SLUG}/ios-enrollments"
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "mkdir -p ${REMOTE_DIR}"
          scp "${IPA_PATH}" "${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${REMOTE_DIR}/${TOKEN}.ipa"
          echo "Uploaded IPA to ${REMOTE_DIR}/${TOKEN}.ipa"

      - name: Notify API that IPA is ready
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          CALLBACK_SECRET: ${{ secrets.IOS_RESIGN_CALLBACK_SECRET }}
          TOKEN: ${{ inputs.token }}
        run: |
          curl -sSf -X POST "${CALLBACK_URL}" \
            -H "Content-Type: application/json" \
            -H "x-resign-secret: ${CALLBACK_SECRET}" \
            -d "{\"token\":\"${TOKEN}\",\"status\":\"ipa_ready\"}"
          echo "Callback delivered."

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
