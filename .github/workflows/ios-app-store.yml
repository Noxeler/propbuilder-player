name: iOS App Store IPA

run-name: "iOS App Store ${{ inputs.app_slug }} v${{ inputs.version_string }}"

on:
  workflow_dispatch:
    inputs:
      submission_id:
        description: 'DB submission row id (used as callback identifier)'
        required: true
        type: string
      slug:
        description: 'Project slug'
        required: true
        type: string
      app_slug:
        description: 'App slug'
        required: true
        type: string
      share_token:
        description: 'Project share token (if private)'
        required: false
        type: string
        default: ''
      bundle_id:
        description: 'iOS bundle identifier (com.propbuilder.player.<slug>-<app>)'
        required: true
        type: string
      profile_base64:
        description: 'App Store .mobileprovision encoded base64'
        required: true
        type: string
      version_string:
        description: 'Marketing version (CFBundleShortVersionString), ex 1.0'
        required: true
        type: string
      build_number:
        description: 'Build number (CFBundleVersion), monotonic. Default: timestamp'
        required: false
        type: string
        default: ''
      callback_url:
        description: 'API URL to POST when IPA is uploaded to ASC'
        required: true
        type: string

env:
  VPS_HOST: 217.182.60.238
  VPS_USER: noxel
  DATA_DIR: /var/www/propbuilder-data
  TEAM_ID: 9MAHFLX3AK

jobs:
  ios-app-store:
    name: iOS App Store IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: player/package-lock.json

      - name: Set up Rust (iOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: player/src-tauri

      - name: Install Player dependencies
        working-directory: player
        run: npm ci

      - name: Fetch project data from VPS
        working-directory: player/public
        env:
          SLUG: ${{ inputs.slug }}
          APP_SLUG: ${{ inputs.app_slug }}
          SHARE_TOKEN: ${{ inputs.share_token }}
        run: |
          QS=""
          if [ -n "${SHARE_TOKEN}" ]; then QS="?share=${SHARE_TOKEN}"; fi
          curl -sSf "https://propbuilder.noxelstudio.com/api/public/preview/${SLUG}/${APP_SLUG}${QS}" -o raw.json
          jq --arg app "${APP_SLUG}" '.project | .apps |= map(select(.slug == $app or .id == $app))' raw.json > project.json
          rm raw.json
          NAME=$(jq -r '.apps[0].name // "PropBuilder Player"' project.json)
          echo "App display name: ${NAME}"
          CONF=../src-tauri/tauri.conf.json
          jq --arg n "$NAME" '.productName = $n | .app.windows[0].title = $n' "$CONF" > tmp.json && mv tmp.json "$CONF"

      - name: Generate iOS icons from custom icon (if any)
        working-directory: player/public
        run: |
          ICON_DATA=$(jq -r '.apps[0].iconDataUrl // empty' project.json)
          if [ -z "$ICON_DATA" ]; then
            echo "No custom icon; Tauri default will be used."
            exit 0
          fi
          ICON_TMP=$(mktemp -d)
          echo "$ICON_DATA" | sed -E 's#^data:image/[^;]+;base64,##' | base64 -d > "$ICON_TMP/src.png"
          # 1024x1024 alpha-stripped — Apple App Store reviewer rejette les icônes
          # avec canal alpha. On compose sur fond blanc puis 1024x1024.
          sips -s format png "$ICON_TMP/src.png" --out "$ICON_TMP/src-noalpha.png" >/dev/null
          sips -z 1024 1024 "$ICON_TMP/src-noalpha.png" --out ../src-tauri/icons/icon.png >/dev/null
          # Retire le canal alpha proprement (ImageMagick si disponible, sinon sips fait l'affaire le plus souvent).
          if command -v magick >/dev/null 2>&1; then
            magick ../src-tauri/icons/icon.png -background white -alpha remove -alpha off ../src-tauri/icons/icon.png
          fi
          echo "Custom 1024 icon applied (alpha stripped)."

      - name: Import Apple distribution certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_DIST_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          P12_PATH="$RUNNER_TEMP/dist.p12"
          echo "$P12_BASE64" | base64 -d > "$P12_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$P12_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "Imported distribution cert into temporary keychain."
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install App Store provisioning profile
        env:
          PROFILE_B64: ${{ inputs.profile_base64 }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_B64" | base64 -d > "$RUNNER_TEMP/build.mobileprovision"
          PROFILE_UUID=$(security cms -D -i "$RUNNER_TEMP/build.mobileprovision" | plutil -extract UUID raw -)
          PROFILE_NAME=$(security cms -D -i "$RUNNER_TEMP/build.mobileprovision" | plutil -extract Name raw -)
          cp "$RUNNER_TEMP/build.mobileprovision" "$PROFILE_DIR/${PROFILE_UUID}.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed App Store profile $PROFILE_NAME ($PROFILE_UUID)"

      - name: Configure Tauri iOS bundle identifier + version
        working-directory: player
        env:
          BUNDLE_ID: ${{ inputs.bundle_id }}
          VERSION: ${{ inputs.version_string }}
          BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          # Build number monotonic : si vide, on prend le timestamp epoch.
          # Apple impose CFBundleVersion strictement croissant entre uploads
          # de la même app — donc timestamp = safe par défaut.
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER=$(date +%s)
          fi
          CONF=src-tauri/tauri.conf.json
          jq --arg b "$BUNDLE_ID" --arg v "$VERSION" \
            '.identifier = $b | .version = $v' "$CONF" > tmp.json && mv tmp.json "$CONF"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "Set bundle=$BUNDLE_ID version=$VERSION build=$BUILD_NUMBER"

      - name: Init Tauri iOS project
        working-directory: player
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ env.TEAM_ID }}
        run: npm run tauri ios init

      - name: Patch Info.plist build number
        working-directory: player/src-tauri/gen/apple
        run: |
          # Tauri ne propage pas le build number depuis tauri.conf.json vers
          # CFBundleVersion. On patch le Info.plist directement.
          # Le path Info.plist dépend de la version Tauri, on cherche.
          PLIST=$(find . -name "Info.plist" -path "*PropBuilder*" | head -1)
          if [ -z "$PLIST" ]; then
            PLIST=$(find . -name "Info.plist" | grep -v Pods | head -1)
          fi
          if [ -z "$PLIST" ]; then
            echo "Info.plist introuvable — skip"
            ls -R
            exit 1
          fi
          plutil -replace CFBundleVersion -string "$BUILD_NUMBER" "$PLIST"
          plutil -replace CFBundleShortVersionString -string "${{ inputs.version_string }}" "$PLIST"
          echo "Patched $PLIST: version=${{ inputs.version_string }} build=$BUILD_NUMBER"

      - name: Build iOS IPA (App Store signed)
        working-directory: player
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ env.TEAM_ID }}
        run: |
          BUNDLE_ID="${{ inputs.bundle_id }}"
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
          npm run tauri ios build -- --export-method app-store

      - name: Locate IPA
        id: find_ipa
        run: |
          IPA=$(find player/src-tauri/gen/apple/build -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            IPA=$(find player -name "*.ipa" | head -1)
          fi
          if [ -z "$IPA" ]; then
            echo "Build did not produce an IPA"
            find player -name "*.ipa" -o -name "*.app" || true
            exit 1
          fi
          echo "Found IPA: $IPA ($(du -h "$IPA" | cut -f1))"
          echo "path=$IPA" >> "$GITHUB_OUTPUT"

      - name: Install ASC API key for altool
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_KEY_P8: ${{ secrets.APPLE_API_PRIVATE_KEY_P8 }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          # altool cherche le fichier sous AuthKey_<KEY_ID>.p8
          echo "$API_KEY_P8" > "$KEY_DIR/AuthKey_${API_KEY_ID}.p8"
          chmod 600 "$KEY_DIR/AuthKey_${API_KEY_ID}.p8"
          echo "Installed API key for altool."

      - name: Upload IPA to App Store Connect (altool)
        env:
          IPA_PATH: ${{ steps.find_ipa.outputs.path }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          # --output-format xml renvoie un plist parsable. JSON existe aussi
          # mais a parfois des champs manquants selon la version Xcode.
          set -o pipefail
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID" \
            --output-format xml | tee /tmp/altool-out.xml
          echo "Upload submitted. Apple will process the binary asynchronously (~5-15 min)."

      - name: Notify API that IPA was uploaded
        if: success()
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          CALLBACK_SECRET: ${{ secrets.IOS_RESIGN_CALLBACK_SECRET }}
          SUBMISSION_ID: ${{ inputs.submission_id }}
        run: |
          curl -sSf -X POST "${CALLBACK_URL}" \
            -H "Content-Type: application/json" \
            -H "x-resign-secret: ${CALLBACK_SECRET}" \
            -d "{\"submission_id\":${SUBMISSION_ID},\"status\":\"ipa_uploaded\",\"build_number\":\"${BUILD_NUMBER}\"}"
          echo "Callback delivered."

      - name: Notify API on failure
        if: failure()
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          CALLBACK_SECRET: ${{ secrets.IOS_RESIGN_CALLBACK_SECRET }}
          SUBMISSION_ID: ${{ inputs.submission_id }}
        run: |
          curl -sSf -X POST "${CALLBACK_URL}" \
            -H "Content-Type: application/json" \
            -H "x-resign-secret: ${CALLBACK_SECRET}" \
            -d "{\"submission_id\":${SUBMISSION_ID},\"status\":\"build_failed\"}" || true

      - name: Cleanup keychain + API key
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          rm -rf "$HOME/.appstoreconnect/private_keys" || true
