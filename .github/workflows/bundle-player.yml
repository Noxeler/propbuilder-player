name: Bundle Player

run-name: "Bundle ${{ inputs.platforms }} — ${{ inputs.slug }}/${{ inputs.app_slug }} [${{ inputs.build_id }}]"

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Project slug'
        required: true
        type: string
      app_slug:
        description: 'App slug'
        required: true
        type: string
      share_token:
        description: 'Share token (if project is private)'
        required: false
        type: string
        default: ''
      platforms:
        description: 'Comma-separated targets: android,android-twa,macos,windows'
        required: false
        type: string
        default: 'android,macos,windows'
      build_id:
        description: 'Opaque ID used to track this run (generated by the API server)'
        required: false
        type: string
        default: ''

env:
  VPS_HOST: 217.182.60.238
  VPS_USER: noxel
  DATA_DIR: /var/www/propbuilder-data
  CALLBACK_BASE: https://propbuilder.noxelstudio.com

jobs:
  # ---------------------------------------------------------------------------
  # ANDROID
  # ---------------------------------------------------------------------------
  android:
    if: contains(inputs.platforms, 'android')
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: player/package-lock.json

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: Set up Rust (Android arm64 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: player/src-tauri

      - name: Install Player dependencies
        working-directory: player
        run: npm ci

      - name: Fetch project data from VPS
        working-directory: player/public
        env:
          SLUG: ${{ inputs.slug }}
          APP_SLUG: ${{ inputs.app_slug }}
          SHARE_TOKEN: ${{ inputs.share_token }}
        run: |
          QS=""
          if [ -n "${SHARE_TOKEN}" ]; then QS="?share=${SHARE_TOKEN}"; fi
          curl -sSf "https://propbuilder.noxelstudio.com/api/public/preview/${SLUG}/${APP_SLUG}${QS}" -o raw.json
          jq --arg app "${APP_SLUG}" '.project | .apps |= map(select(.slug == $app or .id == $app))' raw.json > project.json
          rm raw.json
          echo "Fetched project.json for ${APP_SLUG} ($(wc -c < project.json) bytes)"
          WIDTH=$(jq -r '.apps[0].resolution.width // 900' project.json)
          HEIGHT=$(jq -r '.apps[0].resolution.height // 1000' project.json)
          NAME=$(jq -r '.apps[0].name // "PropBuilder Player"' project.json)
          echo "Window size: ${WIDTH}x${HEIGHT}, title: ${NAME}"
          CONF=../src-tauri/tauri.conf.json
          jq --argjson w "$WIDTH" --argjson h "$HEIGHT" --arg n "$NAME" \
            '.productName = $n | .app.windows[0].title = $n | .app.windows[0].width = $w | .app.windows[0].height = $h' \
            "$CONF" > tmp.json && mv tmp.json "$CONF"

      - name: Install librsvg (for SVG fallback icon)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq librsvg2-bin imagemagick

      - name: Generate icons (from iconDataUrl, else fallback from app name)
        working-directory: player/public
        run: |
          ICON_DATA=$(jq -r '.apps[0].iconDataUrl // empty' project.json)
          NAME=$(jq -r '.apps[0].name // "PropBuilder Player"' project.json)
          mkdir -p /tmp/icongen
          SRC=/tmp/icongen/src.png

          if [ -n "$ICON_DATA" ]; then
            echo "→ Décodage iconDataUrl pour Android…"
            if ! echo "$ICON_DATA" | sed -E 's#^data:image/[^;]+;base64,##' | base64 -d > "$SRC" 2>/dev/null; then
              echo "  ⚠ base64 illisible — fallback SVG."
              ICON_DATA=""
            fi
          fi

          if [ -z "$ICON_DATA" ]; then
            echo "→ Pas d'iconDataUrl — génération fallback depuis « $NAME »"
            INITIALS=$(LC_ALL=fr_FR.UTF-8 awk '{n=0; for (i=1;i<=NF;i++) {c=substr($i,1,1); if (c ~ /[A-Za-zÀ-ÿ]/) {out=out toupper(c); n++; if (n==2) break}} print out}' <<< "$NAME")
            [ -z "$INITIALS" ] && INITIALS="A"
            cat > /tmp/icongen/src.svg <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3f3f46"/>
                <stop offset="100%" stop-color="#09090b"/>
              </linearGradient>
            </defs>
            <rect width="1024" height="1024" rx="225" fill="url(#bg)"/>
            <text x="512" y="650" text-anchor="middle"
                  font-family="DejaVu Sans, sans-serif"
                  font-size="460" font-weight="600" fill="#fafafa">${INITIALS}</text>
          </svg>
          EOF
            rsvg-convert -w 1024 -h 1024 /tmp/icongen/src.svg -o "$SRC"
            echo "  ✓ Initiales « $INITIALS »"
          fi

          convert "$SRC" -resize 512x512 ../src-tauri/icons/icon.png
          convert "$SRC" -resize 128x128 ../src-tauri/icons/128x128.png
          convert "$SRC" -resize 256x256 ../src-tauri/icons/128x128@2x.png
          convert "$SRC" -resize 32x32 ../src-tauri/icons/32x32.png
          echo "Icônes Tauri remplacées ($(du -h "$SRC" | cut -f1))"

      - name: Init Tauri Android project
        working-directory: player
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: npm run tauri android init

      # Tauri 2 `android init` régénère les mipmap launcher depuis son
      # template interne (logo Tauri bleu/jaune) — il ignore icons/icon.png.
      # On overwrite les 5 densités Android avec notre icône custom AVANT
      # le build, sinon l'APK sort avec le logo Tauri partout sur le
      # launcher Android.
      - name: Overwrite Android mipmaps with custom icon
        working-directory: player
        run: |
          ICON_SRC=src-tauri/icons/icon.png
          RES=src-tauri/gen/android/app/src/main/res
          if [ ! -f "$ICON_SRC" ] || [ ! -d "$RES" ]; then
            echo "::warning::Icon source ou res dir absent — skip mipmap overwrite"
            exit 0
          fi
          for entry in mdpi:48:108 hdpi:72:162 xhdpi:96:216 xxhdpi:144:324 xxxhdpi:192:432; do
            IFS=: read -r density launcher_sz fg_sz <<< "$entry"
            dir="$RES/mipmap-$density"
            mkdir -p "$dir"
            convert "$ICON_SRC" -resize "${launcher_sz}x${launcher_sz}" "$dir/ic_launcher.png"
            convert "$ICON_SRC" -resize "${launcher_sz}x${launcher_sz}" "$dir/ic_launcher_round.png"
            convert "$ICON_SRC" -resize "${fg_sz}x${fg_sz}" "$dir/ic_launcher_foreground.png"
          done
          echo "✓ mipmap-{mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi}/ic_launcher*.png remplacées"

      # Patch MainActivity.kt pour immersive sticky (hide status + nav bars).
      # Tauri 2 init ne met que enableEdgeToEdge → contenu sous les barres
      # mais barres visibles. WindowInsetsController.hide(systemBars) cache
      # vraiment.
      - name: Patch MainActivity.kt — immersive sticky
        working-directory: player
        run: |
          MAIN_ACTIVITY=$(find src-tauri/gen/android/app/src/main/java -name "MainActivity.kt" | head -1)
          if [ -z "$MAIN_ACTIVITY" ]; then
            echo "::warning::MainActivity.kt introuvable — skip immersive patch"
            exit 0
          fi
          PKG=$(awk '/^package /{print $2; exit}' "$MAIN_ACTIVITY")
          cat > "$MAIN_ACTIVITY" <<EOF
          package $PKG

          import android.os.Bundle
          import androidx.activity.enableEdgeToEdge
          import androidx.core.view.WindowCompat
          import androidx.core.view.WindowInsetsCompat
          import androidx.core.view.WindowInsetsControllerCompat

          class MainActivity : TauriActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
              enableEdgeToEdge()
              super.onCreate(savedInstanceState)
              applyImmersive()
            }

            override fun onWindowFocusChanged(hasFocus: Boolean) {
              super.onWindowFocusChanged(hasFocus)
              if (hasFocus) applyImmersive()
            }

            private fun applyImmersive() {
              WindowCompat.setDecorFitsSystemWindows(window, false)
              val controller = WindowInsetsControllerCompat(window, window.decorView)
              controller.hide(WindowInsetsCompat.Type.systemBars())
              controller.systemBarsBehavior =
                WindowInsetsControllerCompat.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE
            }
          }
          EOF
          echo "✓ MainActivity.kt patched ($MAIN_ACTIVITY)"

      - name: Build Android APK (debug, arm64 only)
        working-directory: player
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: npm run tauri android build -- --apk --debug --target aarch64

      - name: Locate APK
        id: find_apk
        run: |
          APK=$(find player -name "*.apk" -path "*/outputs/*" | head -1)
          if [ -z "$APK" ]; then
            echo "No APK produced"
            find player -name "*.apk" || true
            exit 1
          fi
          echo "Found APK: $APK ($(du -h "$APK" | cut -f1))"
          echo "path=$APK" >> "$GITHUB_OUTPUT"

      - name: Set up SSH to VPS
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload APK to VPS
        env:
          APK_PATH: ${{ steps.find_apk.outputs.path }}
          SLUG: ${{ inputs.slug }}
          APP_SLUG: ${{ inputs.app_slug }}
        run: |
          # Wipe ONLY le player-android.apk précédent — pas tout le player-*
          # (sinon un build Android écraserait un .dmg/.exe issus d'un autre job).
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "mkdir -p ${{ env.DATA_DIR }}/${SLUG}/${APP_SLUG} && rm -f ${{ env.DATA_DIR }}/${SLUG}/${APP_SLUG}/player-android.apk"
          rsync -avz "${APK_PATH}" "${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.DATA_DIR }}/${SLUG}/${APP_SLUG}/player-android.apk"

  # ---------------------------------------------------------------------------
  # ANDROID TWA — Trusted Web Activity. APK léger (~500 KB) qui wrap le
  # Chrome installé sur le device au lieu d'embarquer une WebView. Beaucoup
  # plus rapide sur vieux Android car Chrome est toujours à jour via Play
  # Store. Pas besoin de Rust/NDK comme pour Tauri — juste Bubblewrap CLI
  # qui prend le manifest URL exposé par notre API et émet un APK signé.
  # ---------------------------------------------------------------------------
  android-twa:
    if: contains(inputs.platforms, 'android-twa')
    name: Android TWA APK (lightweight)
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@latest

      - name: Pre-configure Bubblewrap (skip JDK/SDK install prompts)
        run: |
          # Bubblewrap stocke ses paths JDK+SDK dans ~/.bubblewrap/config.json.
          # Sans ce fichier, il demande interactivement "Do you want
          # Bubblewrap to install the JDK?" au 1er run et bloque le job.
          # On lui pointe sur ce que setup-java + setup-android ont installé.
          mkdir -p "$HOME/.bubblewrap"
          # JAVA_HOME est exporté par actions/setup-java
          # ANDROID_HOME est exporté par android-actions/setup-android
          cat > "$HOME/.bubblewrap/config.json" <<EOF
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_HOME}"
          }
          EOF
          echo "  jdkPath        = ${JAVA_HOME}"
          echo "  androidSdkPath = ${ANDROID_HOME}"

      - name: Restore keystore from secret
        env:
          KEYSTORE_B64: ${{ secrets.TWA_KEYSTORE_BASE64 }}
        run: |
          # Le keystore est stocké en base64 dans le secret GHA pour qu'il
          # passe le YAML sans soucis d'encodage binaire. On le décode dans
          # un fichier local utilisé ensuite par bubblewrap pour signer.
          if [ -z "${KEYSTORE_B64}" ]; then
            echo "ERROR: secret TWA_KEYSTORE_BASE64 absent — cf README pour le générer." >&2
            exit 1
          fi
          mkdir -p .twa
          echo "${KEYSTORE_B64}" | base64 -d > .twa/twa.keystore
          echo "  ✓ keystore restauré ($(stat -c%s .twa/twa.keystore) bytes)"

      - name: Extract SHA256 fingerprint
        id: fingerprint
        env:
          KEY_PASS: ${{ secrets.TWA_KEYSTORE_PASS }}
        run: |
          if [ -z "${KEY_PASS}" ]; then
            echo "ERROR: secret TWA_KEYSTORE_PASS absent." >&2
            exit 1
          fi
          # Force en_US locale pour avoir "SHA256:" au lieu de la trad locale.
          KEYTOOL_RAW=$(keytool -J-Duser.language=en -J-Duser.country=US \
            -list -v -keystore .twa/twa.keystore -alias android \
            -storepass "${KEY_PASS}" 2>&1)
          SHA256=$(echo "${KEYTOOL_RAW}" \
            | grep -iE 'SHA-?256' | head -1 \
            | grep -oE '([0-9A-Fa-f]{2}:){31}[0-9A-Fa-f]{2}' | head -1 \
            | tr 'a-f' 'A-F')
          if [ -z "${SHA256}" ]; then
            echo "ERROR: fingerprint introuvable. Keytool brut :" >&2
            echo "${KEYTOOL_RAW}" | head -30 >&2
            exit 1
          fi
          echo "fingerprint=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "  ✓ SHA256 = ${SHA256}"

      - name: Compute package name + manifest URL
        id: meta
        env:
          SLUG: ${{ inputs.slug }}
          APP_SLUG: ${{ inputs.app_slug }}
        run: |
          # Slug Android package : pas de tirets, lowercase, segments
          # alphanumériques + underscores. On nettoie le couple slug/app
          # comme le script local pour produire la même clé entre les
          # deux pipelines.
          SAFE=$(echo "${SLUG}-${APP_SLUG}" \
            | tr -c '[:alnum:]' '_' \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/_*$//' \
            | sed 's/__*/_/g')
          PKG="com.noxelstudio.propbuilder.${SAFE}"
          echo "package_name=${PKG}" >> "$GITHUB_OUTPUT"
          echo "manifest_url=${{ env.CALLBACK_BASE }}/api/public/projects/${SLUG}/apps/${APP_SLUG}/manifest.webmanifest" >> "$GITHUB_OUTPUT"
          echo "  packageName = ${PKG}"

      - name: Register fingerprint with API (assetlinks.json)
        env:
          PKG: ${{ steps.meta.outputs.package_name }}
          FP: ${{ steps.fingerprint.outputs.fingerprint }}
          CB_SECRET: ${{ secrets.BUILD_CALLBACK_SECRET }}
        run: |
          if [ -z "${CB_SECRET}" ]; then
            echo "  ⚠ BUILD_CALLBACK_SECRET secret absent — fingerprint non enregistré, le TWA aura la barre Chrome visible."
            exit 0
          fi
          curl -sS -X POST "${{ env.CALLBACK_BASE }}/api/admin/build/register-twa-fingerprint" \
            -H "Content-Type: application/json" \
            -H "x-callback-secret: ${CB_SECRET}" \
            -d "{\"package_name\":\"${PKG}\",\"sha256_fingerprint\":\"${FP}\"}" \
            -w "\nHTTP %{http_code}\n"

      - name: Pre-fill twa-manifest.json
        env:
          PKG: ${{ steps.meta.outputs.package_name }}
          MANIFEST_URL: ${{ steps.meta.outputs.manifest_url }}
          SLUG: ${{ inputs.slug }}
          APP_SLUG: ${{ inputs.app_slug }}
        run: |
          KEY_ABS="$(pwd)/.twa/twa.keystore"
          # Pré-remplit la config Bubblewrap. Le `bubblewrap update`
          # ci-dessous régénère un projet Android complet à partir de ça
          # sans interaction.
          cat > twa-manifest.json <<EOF
          {
            "packageId": "${PKG}",
            "host": "propbuilder.noxelstudio.com",
            "name": "PropBuilder Player",
            "launcherName": "PropBuilder",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#000000",
            "enableNotifications": false,
            "startUrl": "/p/${SLUG}/${APP_SLUG}",
            "iconUrl": "${{ env.CALLBACK_BASE }}/api/public/projects/${SLUG}/apps/${APP_SLUG}/icon-512.png",
            "maskableIconUrl": "${{ env.CALLBACK_BASE }}/api/public/projects/${SLUG}/apps/${APP_SLUG}/icon-512.png",
            "appVersionName": "1.0.0",
            "appVersionCode": ${{ github.run_number }},
            "signingKey": { "path": "${KEY_ABS}", "alias": "android" },
            "splashScreenFadeOutDuration": 300,
            "orientation": "portrait",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": false,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "${{ env.CALLBACK_BASE }}/p/${SLUG}/${APP_SLUG}"
          }
          EOF

      - name: Bubblewrap init/update + build
        env:
          KEY_PASS: ${{ secrets.TWA_KEYSTORE_PASS }}
          MANIFEST_URL: ${{ steps.meta.outputs.manifest_url }}
        run: |
          # 1ère étape : update (si projet déjà bootstrapped) sinon init.
          bubblewrap update --skipVersionUpgrade 2>&1 || \
            bubblewrap init --manifest="${MANIFEST_URL}"
          # 2ème étape : build signé avec le keystore restauré.
          # Bubblewrap demande les passes via prompt — on les pipe via
          # KEYSTORE_PASSWORD/KEY_PASSWORD env vars qu'il sait lire.
          export KEYSTORE_PASSWORD="${KEY_PASS}"
          export KEY_PASSWORD="${KEY_PASS}"
          bubblewrap build --skipPwaValidation

      - name: Locate signed APK
        id: find_apk
        run: |
          APK=$(find . -name "*-signed.apk" 2>/dev/null | head -1)
          [ -z "$APK" ] && APK=$(find . -name "app-release-signed.apk" 2>/dev/null | head -1)
          [ -z "$APK" ] && APK=$(find . -name "*.apk" 2>/dev/null | grep -E 'release|signed' | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: aucune APK signée trouvée." >&2
            find . -name "*.apk" 2>/dev/null | head -20 >&2 || true
            exit 1
          fi
          echo "path=${APK}" >> "$GITHUB_OUTPUT"
          echo "  ✓ APK : ${APK} ($(du -h "${APK}" | cut -f1))"

      - name: Set up SSH to VPS
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload APK to VPS
        env:
          APK_PATH: ${{ steps.find_apk.outputs.path }}
          SLUG: ${{ inputs.slug }}
          APP_SLUG: ${{ inputs.app_slug }}
        run: |
          # Même slot que le Tauri APK — l'auteur choisit Tauri OU TWA pour
          # une app donnée, pas les deux en parallèle (un seul player-android.apk
          # téléchargé par l'aperçu public à la fois).
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "mkdir -p ${{ env.DATA_DIR }}/${SLUG}/${APP_SLUG} && rm -f ${{ env.DATA_DIR }}/${SLUG}/${APP_SLUG}/player-android.apk"
          rsync -avz "${APK_PATH}" "${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.DATA_DIR }}/${SLUG}/${APP_SLUG}/player-android.apk"

  # ---------------------------------------------------------------------------
  # macOS
  # ---------------------------------------------------------------------------
  macos:
    if: contains(inputs.platforms, 'macos')
    name: macOS DMG (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: player/package-lock.json

      - name: Set up Rust (universal)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: player/src-tauri

      - name: Install Player dependencies
        working-directory: player
        run: npm ci

      - name: Fetch project data from VPS
        working-directory: player/public
        env:
          SLUG: ${{ inputs.slug }}
          APP_SLUG: ${{ inputs.app_slug }}
          SHARE_TOKEN: ${{ inputs.share_token }}
        run: |
          QS=""
          if [ -n "${SHARE_TOKEN}" ]; then QS="?share=${SHARE_TOKEN}"; fi
          curl -sSf "https://propbuilder.noxelstudio.com/api/public/preview/${SLUG}/${APP_SLUG}${QS}" -o raw.json
          jq --arg app "${APP_SLUG}" '.project | .apps |= map(select(.slug == $app or .id == $app))' raw.json > project.json
          rm raw.json
          echo "Fetched project.json for ${APP_SLUG} ($(wc -c < project.json) bytes)"
          WIDTH=$(jq -r '.apps[0].resolution.width // 900' project.json)
          HEIGHT=$(jq -r '.apps[0].resolution.height // 1000' project.json)
          NAME=$(jq -r '.apps[0].name // "PropBuilder Player"' project.json)
          CONF=../src-tauri/tauri.conf.json
          jq --argjson w "$WIDTH" --argjson h "$HEIGHT" --arg n "$NAME" \
            '.productName = $n | .app.windows[0].title = $n | .app.windows[0].width = $w | .app.windows[0].height = $h' \
            "$CONF" > tmp.json && mv tmp.json "$CONF"

      # create-dmg : DMG avec fond custom Tahoe-compatible (Tauri 2.10 ignore
      # silencieusement bundle.macOS.dmg, cf. tentative ratée 1a85680).
      # librsvg : SVG → PNG pour le fond généré par app + fallback icône.
      - name: Install create-dmg + librsvg
        run: brew install create-dmg librsvg

      - name: Generate .icns (from iconDataUrl, else fallback from app name)
        working-directory: player/public
        run: |
          ICON_DATA=$(jq -r '.apps[0].iconDataUrl // empty' project.json)
          NAME=$(jq -r '.apps[0].name // "PropBuilder Player"' project.json)
          ICON_TMP=$(mktemp -d)

          if [ -n "$ICON_DATA" ]; then
            echo "→ Décodage iconDataUrl du project.json…"
            if ! echo "$ICON_DATA" | sed -E 's#^data:image/[^;]+;base64,##' | base64 -d > "$ICON_TMP/src.png" 2>/dev/null; then
              echo "  ⚠ base64 illisible — fallback SVG."
              ICON_DATA=""
            fi
          fi

          if [ -z "$ICON_DATA" ]; then
            echo "→ Pas d'iconDataUrl — génération fallback depuis « $NAME »…"
            INITIALS=$(LC_ALL=fr_FR.UTF-8 awk '{n=0; for (i=1;i<=NF;i++) {c=substr($i,1,1); if (c ~ /[A-Za-zÀ-ÿ]/) {out=out toupper(c); n++; if (n==2) break}} print out}' <<< "$NAME")
            [ -z "$INITIALS" ] && INITIALS="A"
            cat > "$ICON_TMP/src.svg" <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3f3f46"/>
                <stop offset="100%" stop-color="#09090b"/>
              </linearGradient>
            </defs>
            <rect width="1024" height="1024" rx="225" fill="url(#bg)"/>
            <text x="512" y="650" text-anchor="middle"
                  font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif"
                  font-size="460" font-weight="600" fill="#fafafa">${INITIALS}</text>
          </svg>
          EOF
            rsvg-convert -w 1024 -h 1024 "$ICON_TMP/src.svg" -o "$ICON_TMP/src.png"
            echo "  ✓ Initiales « $INITIALS »"
          fi

          ICONSET="$ICON_TMP/icon.iconset"
          mkdir -p "$ICONSET"
          for size in 16 32 128 256 512; do
            sips -z "$size" "$size" "$ICON_TMP/src.png" --out "$ICONSET/icon_${size}x${size}.png" >/dev/null
            double=$((size * 2))
            sips -z "$double" "$double" "$ICON_TMP/src.png" --out "$ICONSET/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o ../src-tauri/icons/icon.icns
          ls -l ../src-tauri/icons/icon.icns
          rm -rf "$ICON_TMP"

      # Import Mac Developer ID cert (DIFFERENT from the iOS APPLE_DIST_CERT_P12).
      # Falls back to unsigned build if APPLE_DEVELOPER_ID_CERT_P12 is missing.
      - name: Import Developer ID certificate into temp keychain
        env:
          APPLE_DEVELOPER_ID_CERT_P12: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 }}
          APPLE_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID_CERT_P12" ]; then
            echo "::warning::APPLE_DEVELOPER_ID_CERT_P12 secret missing — DMG will be unsigned."
            exit 0
          fi
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASS=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          echo "$APPLE_DEVELOPER_ID_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm "$RUNNER_TEMP/cert.p12"
          echo "Identities available for signing:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # Tauri ne fait QUE le .app signé (--bundles app). On orchestre le DMG
      # nous-mêmes via create-dmg ensuite — Tauri 2.10 ignore bundle.macOS.dmg
      # et son bundler interne ne produit pas un .DS_Store Tahoe-compatible
      # (bg invisible sur macOS 26.x). create-dmg + Finder AppleScript fait
      # écrire le .DS_Store par Finder → format reconnu sur Tahoe.
      - name: Build .app (universal, signed if cert present)
        working-directory: player
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm run tauri build -- --target universal-apple-darwin --bundles app

      - name: Locate .app
        id: find_app
        run: |
          APP=$(find player/src-tauri/target -path "*/release/bundle/macos/*.app" -maxdepth 7 -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::Aucun .app produit"
            find player/src-tauri/target -name "*.app" -maxdepth 7 || true
            exit 1
          fi
          APP_NAME=$(basename "$APP" .app)
          echo "Found .app: $APP"
          echo "path=$APP" >> "$GITHUB_OUTPUT"
          echo "name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Build DMG with custom background (create-dmg + Finder AppleScript)
        id: build_dmg
        env:
          APP_PATH: ${{ steps.find_app.outputs.path }}
          APP_NAME: ${{ steps.find_app.outputs.name }}
        run: |
          # Génère le PNG de fond 540×360 spécifique à l'app — charcoal +
          # grille blueprint + nom de l'app en header + flèche → entre l'icône
          # app (140, 180) et le shortcut Applications (400, 180) + hint en bas.
          BG_TMP=$(mktemp -d)
          SAFE=$(echo "$APP_NAME" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/"/\&quot;/g')
          SAFE_UPPER=$(LC_ALL=fr_FR.UTF-8 awk '{print toupper($0)}' <<< "$SAFE")
          # Palette light : off-white (#f4f4f5 zinc-100) + grille zinc-200 +
          # texte zinc-500/600. Aligné sur Tahoe system bg + style blueprint.
          cat > "$BG_TMP/bg.svg" <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="540" height="360" viewBox="0 0 540 360">
            <defs>
              <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
                <path d="M36 0 L0 0 0 36" stroke="#e4e4e7" stroke-width="0.5" fill="none"/>
              </pattern>
            </defs>
            <rect width="540" height="360" fill="#f4f4f5"/>
            <rect width="540" height="360" fill="url(#grid)"/>
            <text x="270" y="62" text-anchor="middle"
                  font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif"
                  font-size="13" font-weight="500" letter-spacing="6" fill="#71717a">${SAFE_UPPER}</text>
            <line x1="225" y1="180" x2="315" y2="180" stroke="#52525b" stroke-width="2"/>
            <polyline points="300,168 320,180 300,192" fill="none" stroke="#52525b"
                      stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <text x="270" y="312" text-anchor="middle"
                  font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif"
                  font-size="11.5" fill="#52525b">Glissez l'application vers le dossier Applications</text>
          </svg>
          EOF
          rsvg-convert -w 540 -h 360 "$BG_TMP/bg.svg" -o "$BG_TMP/bg.png"

          # --volicon : on réutilise l'icns custom/fallback comme icône du
          # volume monté (visible dans la sidebar Finder + Bureau).
          VOLICON_ARGS=()
          if [ -f player/src-tauri/icons/icon.icns ]; then
            VOLICON_ARGS=(--volicon "$(pwd)/player/src-tauri/icons/icon.icns")
          fi

          DMG_OUT="$BG_TMP/${APP_NAME}.dmg"
          create-dmg \
            --volname "$APP_NAME" \
            "${VOLICON_ARGS[@]}" \
            --background "$BG_TMP/bg.png" \
            --window-pos 200 120 \
            --window-size 540 360 \
            --icon-size 96 \
            --icon "${APP_NAME}.app" 140 180 \
            --hide-extension "${APP_NAME}.app" \
            --app-drop-link 400 180 \
            --no-internet-enable \
            "$DMG_OUT" "$APP_PATH"

          if [ ! -f "$DMG_OUT" ]; then
            echo "::error::create-dmg a échoué"
            exit 1
          fi
          echo "DMG : $DMG_OUT ($(du -h "$DMG_OUT" | cut -f1))"
          echo "path=$DMG_OUT" >> "$GITHUB_OUTPUT"

      # Sign + notarize le DMG (Tauri ne le fait plus puisqu'on est passé à
      # --bundles app). Skip silencieusement si pas de cert / pas de creds —
      # le DMG reste utilisable mais Gatekeeper affichera un warning.
      - name: Sign + notarize DMG
        env:
          DMG_PATH: ${{ steps.build_dmg.outputs.path }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARYTOOL_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARYTOOL_APP_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARYTOOL_TEAM_ID }}
        run: |
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "::warning::APPLE_SIGNING_IDENTITY manquant — DMG NON signé NON notarized"
            exit 0
          fi
          echo "→ codesign DMG…"
          codesign --sign "$SIGNING_IDENTITY" --timestamp "$DMG_PATH"
          if [ -z "$NOTARY_APPLE_ID" ] || [ -z "$NOTARY_PASSWORD" ] || [ -z "$NOTARY_TEAM_ID" ]; then
            echo "::warning::Creds notarytool manquants — DMG signé mais NON notarized"
            exit 0
          fi
          echo "→ notarytool submit (peut prendre 2-10 min)…"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Locate DMG
        id: find_dmg
        env:
          DMG_PATH: ${{ steps.build_dmg.outputs.path }}
        run: |
          if [ ! -f "$DMG_PATH" ]; then
            echo "::error::DMG introuvable à $DMG_PATH"
            exit 1
          fi
          echo "DMG final : $DMG_PATH ($(du -h "$DMG_PATH" | cut -f1))"
          echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Set up SSH to VPS
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload DMG to VPS
        env:
          DMG_PATH: ${{ steps.find_dmg.outputs.path }}
          SLUG: ${{ inputs.slug }}
          APP_SLUG: ${{ inputs.app_slug }}
        run: |
          # Wipe ONLY le player-mac.dmg précédent — pas tout le player-* (sinon
          # un build macOS effacerait un APK/EXE issus d'un autre job).
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "mkdir -p ${{ env.DATA_DIR }}/${SLUG}/${APP_SLUG} && rm -f ${{ env.DATA_DIR }}/${SLUG}/${APP_SLUG}/player-mac.dmg"
          rsync -avz "${DMG_PATH}" "${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.DATA_DIR }}/${SLUG}/${APP_SLUG}/player-mac.dmg"

  # ---------------------------------------------------------------------------
  # Windows
  # ---------------------------------------------------------------------------
  windows:
    if: contains(inputs.platforms, 'windows')
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: player/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: player/src-tauri

      - name: Install Player dependencies
        working-directory: player
        run: npm ci

      - name: Fetch project data from VPS
        working-directory: player/public
        shell: bash
        env:
          SLUG: ${{ inputs.slug }}
          APP_SLUG: ${{ inputs.app_slug }}
          SHARE_TOKEN: ${{ inputs.share_token }}
        run: |
          QS=""
          if [ -n "${SHARE_TOKEN}" ]; then QS="?share=${SHARE_TOKEN}"; fi
          curl -sSf "https://propbuilder.noxelstudio.com/api/public/preview/${SLUG}/${APP_SLUG}${QS}" -o raw.json
          jq --arg app "${APP_SLUG}" '.project | .apps |= map(select(.slug == $app or .id == $app))' raw.json > project.json
          rm raw.json
          WIDTH=$(jq -r '.apps[0].resolution.width // 900' project.json)
          HEIGHT=$(jq -r '.apps[0].resolution.height // 1000' project.json)
          NAME=$(jq -r '.apps[0].name // "PropBuilder Player"' project.json)
          CONF=../src-tauri/tauri.conf.json
          jq --argjson w "$WIDTH" --argjson h "$HEIGHT" --arg n "$NAME" \
            '.productName = $n | .app.windows[0].title = $n | .app.windows[0].width = $w | .app.windows[0].height = $h' \
            "$CONF" > tmp.json && mv tmp.json "$CONF"

      - name: Generate icons from custom icon (if any)
        working-directory: player/public
        shell: bash
        run: |
          ICON_DATA=$(jq -r '.apps[0].iconDataUrl // empty' project.json)
          if [ -z "$ICON_DATA" ]; then
            echo "No custom icon, using default."
            exit 0
          fi
          echo "$ICON_DATA" | sed -E 's#^data:image/[^;]+;base64,##' | base64 -d > /tmp/src.png
          magick /tmp/src.png -resize 512x512 ../src-tauri/icons/icon.png
          magick /tmp/src.png -resize 128x128 ../src-tauri/icons/128x128.png
          magick /tmp/src.png -resize 256x256 ../src-tauri/icons/128x128@2x.png
          magick /tmp/src.png -resize 32x32 ../src-tauri/icons/32x32.png
          magick /tmp/src.png -define icon:auto-resize=256,128,64,32,16 ../src-tauri/icons/icon.ico
          echo "Custom icon applied."

      - name: Build EXE (NSIS installer, unsigned)
        working-directory: player
        run: npm run tauri build -- --bundles nsis

      - name: Locate EXE
        id: find_exe
        shell: bash
        run: |
          EXE=$(find player/src-tauri/target -name "*-setup.exe" | head -1)
          if [ -z "$EXE" ]; then
            echo "No installer produced"
            exit 1
          fi
          echo "Found EXE: $EXE ($(du -h "$EXE" | cut -f1))"
          echo "path=$EXE" >> "$GITHUB_OUTPUT"

      - name: Set up SSH to VPS
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload EXE to VPS
        shell: bash
        env:
          EXE_PATH: ${{ steps.find_exe.outputs.path }}
          SLUG: ${{ inputs.slug }}
          APP_SLUG: ${{ inputs.app_slug }}
        run: |
          # Wipe ONLY le player-windows.exe précédent — pas tout le player-*
          # (sinon un build Windows effacerait un APK/DMG issus d'un autre job).
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "mkdir -p ${{ env.DATA_DIR }}/${SLUG}/${APP_SLUG} && rm -f ${{ env.DATA_DIR }}/${SLUG}/${APP_SLUG}/player-windows.exe"
          scp "${EXE_PATH}" "${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.DATA_DIR }}/${SLUG}/${APP_SLUG}/player-windows.exe"

  # ---------------------------------------------------------------------------
  # NOTIFY — POST callback au backend pour déclencher l'email post-build à
  # l'utilisateur (download links + instructions PWA iOS).
  # if: always() pour callback même si certains jobs échouent (le mail liste
  # les plateformes qui ont réussi).
  # ---------------------------------------------------------------------------
  notify:
    name: Notify backend
    runs-on: ubuntu-latest
    needs: [android, android-twa, macos, windows]
    if: always() && inputs.build_id != ''
    steps:
      - name: Determine succeeded platforms
        id: platforms
        run: |
          SUCCEEDED=""
          # Tauri APK et TWA APK partagent le même slot 'android' côté
          # publish (un seul player-android.apk par app). Si l'un OU
          # l'autre a réussi, on déclare android comme publié.
          if [ "${{ needs.android.result }}" = "success" ] \
             || [ "${{ needs.android-twa.result }}" = "success" ]; then
            SUCCEEDED="${SUCCEEDED} android"
          fi
          if [ "${{ needs.macos.result }}"   = "success" ]; then SUCCEEDED="${SUCCEEDED} macos"; fi
          if [ "${{ needs.windows.result }}" = "success" ]; then SUCCEEDED="${SUCCEEDED} windows"; fi
          # Trim leading/trailing space
          SUCCEEDED="$(echo "${SUCCEEDED}" | xargs)"
          echo "succeeded=${SUCCEEDED}" >> "$GITHUB_OUTPUT"
          echo "Platforms succeeded: '${SUCCEEDED}'"

      - name: POST callback to backend
        env:
          BUILD_ID: ${{ inputs.build_id }}
          PLATFORMS: ${{ steps.platforms.outputs.succeeded }}
          SECRET: ${{ secrets.BUILD_CALLBACK_SECRET }}
        run: |
          if [ -z "${SECRET}" ]; then
            echo "BUILD_CALLBACK_SECRET secret not set on the repo — skipping notify."
            exit 0
          fi
          curl -sS -X POST \
            "${{ env.CALLBACK_BASE }}/api/admin/build/notify-callback/${BUILD_ID}" \
            -H "Content-Type: application/json" \
            -H "x-callback-secret: ${SECRET}" \
            -d "{\"platforms\":\"${PLATFORMS}\"}" \
            -w "\nHTTP %{http_code}\n"
